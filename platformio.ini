[env:waveshare_esp32s3_lcd169]
platform  = espressif32
board     = esp32-s3-devkitc-1
framework = arduino

; ── Flash / PSRAM ─────────────────────────────────────────────────────────────
; Board has 16 MB QIO flash + 8 MB OPI PSRAM (on-chip in ESP32-S3R8).
board_build.flash_size          = 16MB
board_upload.flash_size         = 16MB
board_build.arduino.memory_type = qio_opi
board_build.partitions          = default_16MB.csv

; ── USB ───────────────────────────────────────────────────────────────────────
; ESP32-S3-LCD-1.69 uses native USB OTG — no UART bridge chip.
; CDC-on-boot makes Serial available over USB without an extra driver.
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DLV_CONF_INCLUDE_SIMPLE
    -I${PROJECT_INCLUDE_DIR}

; ── Libraries ─────────────────────────────────────────────────────────────────
; SensorLib pinned to 0.1.6 — the version bundled in the Waveshare demo.
; 0.1.6 uses begin(Wire, addr, sda, scl); later versions changed parameter order.
; GFX Library is unpinned — latest version is required for Arduino-ESP32 3.x
; compatibility (1.4.9 has a type mismatch in Arduino_ESP32SPI.cpp on ESP-IDF 5.x).
lib_deps =
    moononournation/GFX Library for Arduino
    lewisxhe/SensorLib@0.1.6
    lvgl/lvgl@^8.3

; ── Monitor ───────────────────────────────────────────────────────────────────
monitor_speed   = 115200
monitor_filters = esp32_exception_decoder
